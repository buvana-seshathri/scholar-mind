<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ScholarMind</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f1117; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }

    header { padding: 16px 32px; background: #1a1d27; border-bottom: 1px solid #2e3147; display: flex; align-items: center; gap: 12px; }
    header h1 { font-size: 1.3rem; color: #7c6af7; font-weight: 700; }
    header span { font-size: 0.85rem; color: #666; }

    .main { display: flex; flex: 1; overflow: hidden; }

    /* Sidebar */
    .sidebar { width: 280px; background: #1a1d27; border-right: 1px solid #2e3147; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
    .sidebar h2 { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; color: #666; }
    .upload-area { border: 2px dashed #2e3147; border-radius: 10px; padding: 24px 16px; text-align: center; cursor: pointer; transition: border-color 0.2s; }
    .upload-area:hover { border-color: #7c6af7; }
    .upload-area input { display: none; }
    .upload-area label { cursor: pointer; font-size: 0.9rem; color: #aaa; }
    .upload-btn { background: #7c6af7; color: white; border: none; padding: 10px; border-radius: 8px; width: 100%; cursor: pointer; font-size: 0.9rem; }
    .upload-btn:hover { background: #6857e0; }
    .paper-tag { background: #252838; border-radius: 8px; padding: 10px 12px; font-size: 0.82rem; color: #aaa; word-break: break-all; }
    .paper-tag span { color: #7c6af7; font-weight: 600; }

    /* Chat */
    .chat-area { flex: 1; display: flex; flex-direction: column; }
    .messages { flex: 1; overflow-y: auto; padding: 24px 32px; display: flex; flex-direction: column; gap: 20px; }
    .message { max-width: 75%; }
    .message.user { align-self: flex-end; }
    .message.bot { align-self: flex-start; }
    .bubble { padding: 14px 18px; border-radius: 14px; font-size: 0.92rem; line-height: 1.6; }
    .user .bubble { background: #7c6af7; color: white; border-bottom-right-radius: 4px; }
    .bot .bubble { background: #1e2133; color: #e0e0e0; border-bottom-left-radius: 4px; }
    .sources { margin-top: 10px; display: flex; flex-direction: column; gap: 6px; }
    .source-chip { background: #252838; border-left: 3px solid #7c6af7; padding: 8px 12px; border-radius: 6px; font-size: 0.78rem; color: #999; }
    .source-chip strong { color: #7c6af7; }

    /* Input */
    .input-bar { padding: 16px 32px; background: #1a1d27; border-top: 1px solid #2e3147; display: flex; gap: 10px; }
    .input-bar input { flex: 1; background: #252838; border: 1px solid #2e3147; border-radius: 10px; padding: 12px 16px; color: #e0e0e0; font-size: 0.92rem; outline: none; }
    .input-bar input:focus { border-color: #7c6af7; }
    .input-bar button { background: #7c6af7; color: white; border: none; padding: 12px 20px; border-radius: 10px; cursor: pointer; font-size: 0.92rem; }
    .input-bar button:hover { background: #6857e0; }
    .status { font-size: 0.8rem; color: #7c6af7; padding: 0 32px 10px; }
  </style>
</head>
<body>
  <header>
    <h1>🔬 ScholarMind</h1>
    <span>RAG-powered research assistant</span>
  </header>

  <div class="main">
    <div class="sidebar">
      <h2>Upload Paper</h2>
      <div class="upload-area">
        <input type="file" id="pdfInput" accept=".pdf" onchange="showSelectedFile()" />
        <label for="pdfInput">📄 Click to select a PDF</label>
      </div>
      <div id="selectedFile" style="display:none; font-size:0.8rem; color:#7c6af7; padding: 6px 4px;">
        📎 <span id="selectedFileName"></span>
      </div>
      <button class="upload-btn" onclick="uploadPDF()">Index Paper</button>
      <div id="paperInfo" style="display:none" class="paper-tag">
        Active paper ID: <span id="paperIdDisplay"></span>
      </div>
    </div>

    <div class="chat-area">
      <div class="messages" id="messages">
        <div class="message bot">
          <div class="bubble">Upload a research paper on the left, then ask me anything about it. I'll answer using only what's in the paper, with source citations.</div>
        </div>
      </div>
      <div class="status" id="status"></div>
      <div class="input-bar">
        <input type="text" id="questionInput" placeholder="Ask about the paper..." onkeydown="if(event.key==='Enter') askQuestion()" />
        <button onclick="askQuestion()">Ask</button>
      </div>
    </div>
  </div>

  <script>
    let currentPaperId = null;

    async function uploadPDF() {
      const input = document.getElementById("pdfInput");
      if (!input.files[0]) { alert("Please select a PDF first."); return; }

      setStatus("Indexing paper...");
      const formData = new FormData();
      formData.append("file", input.files[0]);

      const res = await fetch("/upload", { method: "POST", body: formData });
      const data = await res.json();

      currentPaperId = data.paper_id;
      document.getElementById("paperIdDisplay").textContent = currentPaperId;
      document.getElementById("paperInfo").style.display = "block";
      setStatus(`✅ Indexed ${data.chunks_indexed} chunks from "${data.filename}"`);
    }

    function showSelectedFile() {
        const input = document.getElementById("pdfInput");
        const nameDisplay = document.getElementById("selectedFileName");
        const fileDiv = document.getElementById("selectedFile");
        if (input.files[0]) {
            nameDisplay.textContent = input.files[0].name;
            fileDiv.style.display = "block";
            setStatus("Click 'Index Paper' to begin.");
        }
    }
    async function askQuestion() {
      const input = document.getElementById("questionInput");
      const question = input.value.trim();
      if (!question) return;
      if (!currentPaperId) { alert("Upload a paper first."); return; }

      appendMessage("user", question);
      input.value = "";
      setStatus("Thinking...");

      const res = await fetch("/ask", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ paper_id: currentPaperId, question })
      });
      const data = await res.json();

      appendMessage("bot", data.answer, data.sources);
      setStatus("");
    }

    function appendMessage(role, text, sources = []) {
      const messages = document.getElementById("messages");
      const div = document.createElement("div");
      div.className = `message ${role}`;

      let html = `<div class="bubble">${text.replace(/\n/g, "<br>")}</div>`;
      if (sources.length) {
        html += `<div class="sources">`;
        sources.forEach(s => {
          html += `<div class="source-chip"><strong>Page ${s.page}</strong> — ${s.snippet}...</div>`;
        });
        html += `</div>`;
      }

      div.innerHTML = html;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
    }

    function setStatus(msg) {
      document.getElementById("status").textContent = msg;
    }
  </script>
</body>
</html>
